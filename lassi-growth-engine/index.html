<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lassi x Sixty — Growth Engine</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #fff;
  }

  .card {
    width: 100%;
    max-width: 400px;
    padding: 48px 40px;
    background: #111;
    border: 1px solid #222;
    border-radius: 12px;
    text-align: center;
  }

  .logo {
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 32px;
  }

  .logo strong {
    color: #fff;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 8px;
    color: #fff;
  }

  p {
    font-size: 14px;
    color: #666;
    margin-bottom: 32px;
  }

  .field {
    position: relative;
    margin-bottom: 12px;
  }

  input[type="password"] {
    width: 100%;
    padding: 14px 16px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    font-size: 15px;
    color: #fff;
    outline: none;
    transition: border-color 0.15s;
    letter-spacing: 0.06em;
  }

  input[type="password"]::placeholder {
    color: #444;
    letter-spacing: 0;
  }

  input[type="password"]:focus {
    border-color: #444;
  }

  input[type="password"].error {
    border-color: #c0392b;
    animation: shake 0.3s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  button {
    width: 100%;
    padding: 14px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  button:hover { opacity: 0.85; }
  button:active { opacity: 0.7; }

  .error-msg {
    font-size: 13px;
    color: #c0392b;
    margin-top: 10px;
    min-height: 18px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><strong>Sixty Seconds</strong> · Private Deck</div>
  <h1>Lassi x Sixty<br>Growth Engine</h1>
  <p>Enter your access code to view this proposal.</p>
  <div class="field">
    <input type="password" id="pw" placeholder="Access code" autofocus autocomplete="off" />
  </div>
  <button onclick="check()">View Proposal</button>
  <div class="error-msg" id="err"></div>
</div>

<script>
  const input = document.getElementById('pw');
  const err = document.getElementById('err');

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') check();
    err.textContent = '';
    input.classList.remove('error');
  });

  function check() {
    const val = input.value.trim();
    if (val === 'lassi2026') {
      window.location.href = './deck.html';
    } else {
      input.classList.add('error');
      err.textContent = 'Incorrect access code. Please try again.';
      input.value = '';
      setTimeout(() => input.classList.remove('error'), 400);
    }
  }
</script>
</body>
</html>
